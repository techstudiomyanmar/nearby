<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Landmark Finder - Nearby Places</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #0a0f1d 0%, #0f1629 100%);
            min-height: 100vh;
            padding: 16px;
        }
        
        .container {
            max-width: 650px;
            margin: 0 auto;
        }
        
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        h1 {
            font-size: 28px;
            text-align: center;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        
        .subhead {
            text-align: center;
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 24px;
        }
        
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        
        .cat-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            color: #cbd5e1;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .cat-btn.active {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }
        
        .cat-btn:hover {
            background: rgba(59,130,246,0.5);
        }
        
        .range-selector {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .range-selector label {
            color: #9ca3af;
            font-size: 14px;
            margin-right: 12px;
        }
        
        select {
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        
        #map {
            width: 100%;
            height: 300px;
            border-radius: 24px;
            margin-bottom: 20px;
            background: #1e293b;
        }
        
        .results-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .result-item {
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .result-item:hover {
            background: rgba(255,255,255,0.05);
        }
        
        .result-name {
            font-size: 16px;
            font-weight: 600;
            color: #f3f4f6;
            margin-bottom: 4px;
        }
        
        .result-address {
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 4px;
        }
        
        .result-distance {
            font-size: 11px;
            color: #86efac;
        }
        
        .location-status {
            text-align: center;
            padding: 16px;
            background: rgba(96,165,250,0.1);
            border-radius: 24px;
            margin-bottom: 20px;
            color: #86efac;
            font-size: 14px;
        }
        
        .location-status.error {
            background: rgba(239,68,68,0.1);
            color: #f87171;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 48px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .privacy-note {
            text-align: center;
            font-size: 11px;
            color: #4b5563;
            margin-top: 16px;
        }
        
        .debug {
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 8px;
            font-family: monospace;
            font-size: 9px;
            color: #6b7280;
            margin-top: 16px;
            text-align: left;
            word-break: break-all;
            max-height: 150px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🗺️ Landmark Finder</h1>
            <div class="subhead">Find restaurants, cafes, parks, hospitals and more near you</div>
            
            <div id="locationStatus" class="location-status">
                📍 Getting your location...
            </div>
            
            <div class="categories" id="categories">
                <button class="cat-btn active" data-category="all">📍 All Points</button>
                <button class="cat-btn" data-category="restaurant">🍽️ Restaurants</button>
                <button class="cat-btn" data-category="cafe">☕ Cafes</button>
                <button class="cat-btn" data-category="bar">🍸 Bars</button>
                <button class="cat-btn" data-category="museum">🏛️ Museums</button>
                <button class="cat-btn" data-category="park">🌳 Parks</button>
                <button class="cat-btn" data-category="hospital">🏥 Hospitals</button>
                <button class="cat-btn" data-category="pharmacy">💊 Pharmacy</button>
                <button class="cat-btn" data-category="atm">🏧 ATM</button>
                <button class="cat-btn" data-category="gas_station">⛽ Gas Station</button>
                <button class="cat-btn" data-category="bank">🏦 Banks</button>
                <button class="cat-btn" data-category="shopping_mall">🛍️ Shopping Malls</button>
            </div>
            
            <div class="range-selector">
                <label>📍 Range:</label>
                <select id="rangeSelect">
                    <option value="500">0.3 miles (500m)</option>
                    <option value="1000">0.6 miles (1km)</option>
                    <option value="1609" selected>1 mile (1.6km)</option>
                    <option value="3218">2 miles (3.2km)</option>
                    <option value="4827">3 miles (4.8km)</option>
                </select>
            </div>
            
            <div id="map"></div>
            
            <div class="results-list" id="resultsList">
                <div style="text-align: center; padding: 40px; color: #6b7280;">
                    📍 Waiting for map initialization...
                </div>
            </div>
            
            <button id="refreshBtn">📍 Refresh / Find Nearby</button>
            
            <div id="debug" class="debug"></div>
            <div class="privacy-note">🔒 Location data is processed locally. Powered by Google Places API.</div>
        </div>
    </div>

    <!-- Cleaned up Script Load Engine -->
    <script>
        let map;
        let placesService;
        let markers = [];
        let currentLocation = null;
        let currentCategory = 'all';
        let currentRadius = 1609;
        
        const locationStatus = document.getElementById('locationStatus');
        const resultsList = document.getElementById('resultsList');
        const refreshBtn = document.getElementById('refreshBtn');
        const debugDiv = document.getElementById('debug');
        const rangeSelect = document.getElementById('rangeSelect');
        
        function logDebug(msg) {
            const time = new Date().toLocaleTimeString();
            console.log(`[${time}] ${msg}`);
            debugDiv.innerHTML = `${time}: ${msg}<br>${debugDiv.innerHTML}`;
            const lines = debugDiv.innerHTML.split('<br>');
            if (lines.length > 25) debugDiv.innerHTML = lines.slice(0, 20).join('<br>');
        }

        // Safe exposure to global space for dynamic HTML strings 
        window.centerOnPlace = function(lat, lng, name) {
            if (map) {
                map.setCenter({ lat, lng });
                map.setZoom(17);
            }
            logDebug(`Focused on: ${name}`);
        };

        function getCurrentLocation() {
            logDebug('Fetching hardware device coordinates...');
            locationStatus.innerHTML = '📍 Querying GPS / Network location...';
            locationStatus.classList.remove('error');
            
            if (!navigator.geolocation) {
                showError('Geolocation tracking is not supported by your current browser environment.');
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    currentLocation = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                    logDebug(`Coordinates resolved: ${currentLocation.lat}, ${currentLocation.lng}`);
                    
                    if (!map) {
                        initMap();
                    } else {
                        map.setCenter(currentLocation);
                    }
                    searchNearbyPlaces();
                },
                (error) => {
                    let errorMsg = 'Unknown hardware or permission error.';
                    if (error.code === error.PERMISSION_DENIED) errorMsg = 'Location permission denied by user settings.';
                    if (error.code === error.POSITION_UNAVAILABLE) errorMsg = 'Network tracking signals dropped or unavailable.';
                    if (error.code === error.TIMEOUT) errorMsg = 'Location request timed out.';
                    showError(errorMsg);
                },
                { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
            );
        }
        
        function initMap() {
            if (!currentLocation) return;
            
            map = new google.maps.Map(document.getElementById('map'), {
                center: currentLocation,
                zoom: 14,
                disableDefaultUI: false,
                styles: [{ featureType: 'all', elementType: 'all', stylers: [{ saturation: -85 }, { lightness: -10 }] }]
            });
            
            placesService = new google.maps.places.PlacesService(map);
            
            new google.maps.Marker({
                position: currentLocation,
                map: map,
                icon: {
                    url: 'https://maps.google.com/mapfiles/ms/icons/blue-dot.png',
                    scaledSize: new google.maps.Size(36, 36)
                },
                title: 'Current Position'
            });
            
            logDebug('Google Map Instance Engine online.');
        }
        
        function searchNearbyPlaces() {
            if (!currentLocation || !placesService) {
                logDebug('Engine components missing execution contexts.');
                return;
            }
            
            currentRadius = parseInt(rangeSelect.value);
            const radiusMiles = (currentRadius / 1609).toFixed(1);
            
            logDebug(`Searching category [${currentCategory}] within ${radiusMiles} miles.`);
            resultsList.innerHTML = '<div style="text-align: center; padding: 40px; color: #60a5fa;">🔍 Streaming database nodes...</div>';
            
            clearMarkers();

            // FIXED: Avoid sending parallel bursts of 11 requests. Use general keyword scanning for 'all'
            let request = {
                location: currentLocation,
                radius: currentRadius
            };

            if (currentCategory === 'all') {
                request.keyword = 'establishment'; // Soft catch-all keyword descriptor safely within query window limits
            } else {
                request.type = currentCategory;
            }

            placesService.nearbySearch(request, (results, status) => {
                if (status === google.maps.places.PlacesServiceStatus.OK && results) {
                    displayResults(results);
                } else {
                    logDebug(`Places transaction status mismatch: ${status}`);
                    displayResults([]);
                }
            });
        }
        
        function displayResults(places) {
            if (!places || places.length === 0) {
                resultsList.innerHTML = '<div style="text-align: center; padding: 40px; color: #9ca3af;">📍 No matching markers found within the designated search range.</div>';
                locationStatus.innerHTML = `⚠️ Zero results matching context requirements.`;
                return;
            }
            
            // Haversine sorting locally
            places.sort((a, b) => {
                const distA = google.maps.geometry.spherical.computeDistanceBetween(
                    new google.maps.LatLng(currentLocation.lat, currentLocation.lng), 
                    a.geometry.location
                );
                const distB = google.maps.geometry.spherical.computeDistanceBetween(
                    new google.maps.LatLng(currentLocation.lat, currentLocation.lng), 
                    b.geometry.location
                );
                return distA - distB;
            });
            
            locationStatus.innerHTML = `✅ Displaying ${places.length} nearby locations.`;
            const bounds = new google.maps.LatLngBounds();
            bounds.extend(currentLocation);
            
            let html = '';
            
            places.forEach((place) => {
                const lat = place.geometry.location.lat();
                const lng = place.geometry.location.lng();
                const distanceMeters = Math.round(google.maps.geometry.spherical.computeDistanceBetween(
                    new google.maps.LatLng(currentLocation.lat, currentLocation.lng),
                    place.geometry.location
                ));
                const distanceMiles = (distanceMeters / 1609).toFixed(1);
                
                const marker = new google.maps.Marker({
                    position: { lat, lng },
                    map: map,
                    title: place.name
                });
                
                markers.push(marker);
                bounds.extend({ lat, lng });
                
                const infoWindow = new google.maps.InfoWindow({
                    content: `<div style="color:#000; padding:4px;"><strong>${place.name}</strong><br>${place.vicinity || ''}<br>⭐ ${place.rating || 'N/A'}</div>`
                });
                
                marker.addListener('click', () => {
                    infoWindow.open(map, marker);
                });
                
                const icon = getCategoryIcon(place.types);
                // Clean single quotes to prevent broken string execution inside DOM templates
                const cleanName = place.name.replace(/'/g, "\\'");
                
                html += `
                    <div class="result-item" onclick="window.centerOnPlace(${lat}, ${lng}, '${cleanName}')">
                        <div class="result-name">${icon} ${place.name}</div>
                        <div class="result-address">${place.vicinity || 'Address signature unknown'}</div>
                        <div class="result-distance">📍 ${distanceMiles} mi (${distanceMeters}m) | ⭐ ${place.rating || 'N/A'}</div>
                    </div>
                `;
            });
            
            resultsList.innerHTML = html;
            map.fitBounds(bounds);
        }
        
        function getCategoryIcon(types) {
            if (!types) return '📍';
            const s = types.join(',');
            if (s.includes('restaurant')) return '🍽️';
            if (s.includes('cafe')) return '☕';
            if (s.includes('bar')) return '🍸';
            if (s.includes('museum')) return '🏛️';
            if (s.includes('park')) return '🌳';
            if (s.includes('hospital')) return '🏥';
            if (s.includes('pharmacy')) return '💊';
            if (s.includes('atm')) return '🏧';
            if (s.includes('gas_station')) return '⛽';
            if (s.includes('bank')) return '🏦';
            if (s.includes('shopping_mall')) return '🛍️';
            return '📍';
        }
        
        function clearMarkers() {
            markers.forEach(m => m.setMap(null));
            markers = [];
        }
        
        function showError(msg) {
            locationStatus.innerHTML = `❌ ${msg}`;
            locationStatus.classList.add('error');
            resultsList.innerHTML = `<div style="text-align: center; padding: 40px; color: #f87171;">${msg}</div>`;
        }
        
        // Runtime Bindings
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.getAttribute('data-category');
                if (currentLocation) searchNearbyPlaces();
                else getCurrentLocation();
            });
        });
        
        rangeSelect.addEventListener('change', () => { if (currentLocation) searchNearbyPlaces(); });
        refreshBtn.addEventListener('click', getCurrentLocation);
        
        // Native Map API Bootstrapper callback initialization 
        window.injectMapEngine = function() {
            logDebug('Google Core Framework Callback detected.');
            getCurrentLocation();
        };

        // Inject script dynamically to avoid dependency deadlocks
        const s = document.createElement('script');
        s.src = "https://maps.googleapis.com/maps/api/js?key=AIzaSyBzG2lC2dgtZWe8M895oQU5P55CMlZRyeE&libraries=places,geometry&callback=injectMapEngine";
        s.async = true;
        s.defer = true;
        document.head.appendChild(s);
    </script>
</body>
</html>
